<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Sandbox Clone</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131314;
            color: #e3e3e3;
        }
        /* Custom scrollbar matching Gemini style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #131314; }
        ::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f5357; }
        
        /* Shimmer loading animation */
        .shimmer {
            background: linear-gradient(90deg, #1e1f20 25%, #2a2b2d 50%, #1e1f20 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
        }
        @keyframes loading-shimmer {
            to { background-position: -200% 0; }
        }
    </style>
</head>
<body x-data="chatApp()" x-init="initApp()">

    <div class="flex h-screen overflow-hidden">
        
        <aside :class="sidebarOpen ? 'w-68' : 'w-0 -ml-68 md:w-20 md:ml-0'" 
               class="bg-[#1e1f20] h-full flex flex-col justify-between transition-all duration-300 ease-in-out z-20 shrink-0 border-r border-[#2d2f31]">
            
            <div class="p-4 flex flex-col gap-6">
                <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:bg-[#2d2f31] rounded-full w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                
                <button @click="startNewChat()" 
                        class="flex items-center gap-3 bg-[#1a1b1c] hover:bg-[#28292a] border border-[#3c4043] rounded-full py-2.5 px-4 text-sm text-gray-300 font-medium transition-all shadow-sm"
                        :class="sidebarOpen ? 'justify-start w-full' : 'justify-center w-10 h-10 p-0 overflow-hidden'">
                    <i data-lucide="plus" class="w-5 h-5 text-blue-400 shrink-0"></i>
                    <span x-show="sidebarOpen" x-transition.opacity>New chat</span>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-1">
                <p x-show="sidebarOpen && history.length > 0" class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Recent</p>
                <template x-for="item in history" :key="item.id">
                    <button @click="loadHistorySession(item)" 
                            class="w-full flex items-center gap-3 px-3 py-2 rounded-full text-left text-sm text-gray-300 hover:bg-[#2d2f31] transition-colors group relative"
                            :class="currentSessionId === item.id ? 'bg-[#004a77] text-blue-200 hover:bg-[#004a77]' : ''">
                        <i data-lucide="message-square" class="w-4 h-4 text-gray-400 shrink-0"></i>
                        <span x-show="sidebarOpen" class="truncate pr-4" x-text="item.title"></span>
                    </button>
                </template>
            </div>

            <div class="p-4 space-y-2 border-t border-[#2d2f31]">
                <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#2d2f31] cursor-pointer text-sm text-gray-400 hover:text-white">
                    <i data-lucide="help-circle" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen">Help</span>
                </div>
                <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#2d2f31] cursor-pointer text-sm text-gray-400 hover:text-white">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen">Settings</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#131314] relative h-full overflow-hidden">
            
            <header class="w-full h-16 flex items-center justify-between px-4 z-10 bg-[#131314]/80 backdrop-blur-md">
                <div class="flex items-center gap-2">
                    <button x-show="!sidebarOpen" @click="sidebarOpen = true" class="md:hidden p-2 hover:bg-[#2d2f31] rounded-full text
